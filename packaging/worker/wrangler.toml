name = "station-monitor-updates"
main = "src/index.ts"
compatibility_date = "2026-03-23"
workers_dev = true

# Update these values for your account.
account_id = "e3f3cc22b2042d2b77a6fbbed5c2f54c"

[vars]
UPDATES_PREFIX = ""
DATA_PREFIX = ""
# Optional. If set, requests must include Authorization: Bearer <token>.
# UPDATE_TOKEN = "REPLACE_ME"
# Optional. If set, telemetry ingestion requires Authorization: Bearer <token>.
# TELEMETRY_TOKEN = "REPLACE_ME"

[[r2_buckets]]
binding = "UPDATES_BUCKET"
bucket_name = "monitor-updates"

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "reportes-db"

[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "monitor-telemetry"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[env.development]
workers_dev = true

[env.development.vars]
UPDATES_PREFIX = ""
DATA_PREFIX = ""

[[env.development.r2_buckets]]
binding = "UPDATES_BUCKET"
bucket_name = "development-updates"

[[env.development.r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "development-db"

[[env.development.d1_databases]]
binding = "TELEMETRY_DB"
database_name = "development-monitor-telemetry"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
